name: Auto Release APK

on:
  push:
    tags:
      - '*'  # срабатывает на любой созданный тег

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1️⃣ Checkout кода
      - uses: actions/checkout@v4

      # 2️⃣ Настройка Java для Android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Установка Android SDK
      - uses: android-actions/setup-android@v3

      # 4️⃣ Установка Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      
      - uses: actions/setup-go@v4
        with:
          go-version: '>=1.23'

      # 5️⃣ Получение зависимостей Flutter
      - run: flutter pub get

      # 6️⃣ Сборка APK (release + split per ABI)
      - run: flutter build apk --release --split-per-abi

      # 7️⃣ Создание релиза через GitVerse Release Action
      - name: Create Release
        uses: actions/create-release@v1
        with:
          api_key: ${{ secrets.GITVERSEAPIKEY }}
          title: "Release ${{ github.ref_name }}"
          body: "Авто сборка Flutter APK для ${{ github.ref_name }}"
          files: |
            build/app/outputs/flutter-apk/*.apk
          draft: false
          pre_release: false